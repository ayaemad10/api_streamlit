version: "3.9"

services:
  # ─── FastAPI Backend ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: spectrum_api
    ports:
      - "8000:8000"
    volumes:
      - ./spectrum.db:/app/spectrum.db
      - ./ai_model:/app/ai_model
      - ./logs:/app/logs
    environment:
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-supersecretkey_change_in_prod}
      - DATABASE_URL=sqlite:///./spectrum.db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - LOG_LEVEL=INFO
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - spectrum_net

  # ─── Streamlit Dashboard ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: spectrum_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - API_BASE_URL=http://api:8000
      - LOG_LEVEL=INFO
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - spectrum_net

  # ─── Ollama LLM Server ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: spectrum_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - spectrum_net

volumes:
  ollama_data:

networks:
  spectrum_net:
    driver: bridge
